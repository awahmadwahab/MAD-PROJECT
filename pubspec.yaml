name: campuscan
description: "CampuScan - Smart Attendance System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management & Routing
  provider: ^6.1.2
  go_router: ^14.8.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Biometric Auth
  local_auth: ^2.3.0

  # Local Storage
  shared_preferences: ^2.3.4
  sqflite: ^2.4.1
  path: ^1.9.1

  # CSV Export
  csv: ^6.0.0

  # Google Fonts
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  crypto: ^3.0.6
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
